name: praam-platform

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: praam-postgres
    environment:
      POSTGRES_USER: praam
      POSTGRES_PASSWORD: praam_dev
      POSTGRES_DB: praam_dev
    ports:
      - "15430:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U praam -d praam_dev"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - praam-network

  redis:
    image: redis:7-alpine
    container_name: praam-redis
    ports:
      - "16380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - praam-network

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: praam-litellm
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-praam-litellm-dev}
    env_file:
      - path: .env
        required: false
      - path: ${PRAAM_SECRETS_FILE:-${HOME}/.praam/secrets.env}
        required: false
    volumes:
      - ./config/litellm.yaml:/app/config.yaml:ro
    ports:
      - "3100:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health/liveliness >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - praam-network

networks:
  praam-network:
    name: praam-network
    driver: bridge

volumes:
  pgdata:
