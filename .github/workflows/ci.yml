name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: uv sync --all-extras --frozen

      - name: Unit tests + render-env contract
        run: make check

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: uv sync --all-extras --frozen

      - name: Start platform stack
        run: |
          mkdir -p ~/.praam
          cp .env.example ~/.praam/secrets.env
          make up

      - name: Verify schemas, platform-config, and health
        run: |
          make doctor DOCTOR_FLAGS=--platform-only
          curl -sf http://127.0.0.1:3180/v1/apps/findoc-ai/config | uv run python -c "import sys,json; d=json.load(sys.stdin); assert d['app']=='findoc-ai'"

      - name: Stop platform stack
        if: always()
        run: make down
